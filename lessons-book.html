<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">Book Lessons | Books 'n' Much More</title>
  <meta name="description" id="page-desc" content="Life-changing book lessons in Hindi and English — Books 'n' Much More"/>

  <!-- ══════════════════════════════════════════════════════════
       Open Graph / WhatsApp / Twitter Preview Tags
       Static defaults here; per-book values injected via JS
       once Supabase data loads (no more hardcoded OG_* maps —
       those lived in lessons-data.js, now retired)
       ══════════════════════════════════════════════════════════ -->
  <meta property="og:type"        content="website"/>
  <meta property="og:site_name"   content="Books 'n' Much More"/>
  <meta property="og:title"       id="og-title"
        content="Book Lessons | Books 'n' Much More"/>
  <meta property="og:description" id="og-desc"
        content="Life-changing book lessons in Hindi and English — पढ़ते रहिए, बढ़ते रहिए"/>
  <meta property="og:image"       id="og-image"
        content="https://booksnmuchmore.com/og-default.jpg"/>
  <meta property="og:image:width"  content="1200"/>
  <meta property="og:image:height" content="630"/>
  <meta property="og:url"         id="og-url"
        content="https://booksnmuchmore.com/lessons-book.html"/>
  <link rel="canonical" id="canonical-url"
        href="https://booksnmuchmore.com/lessons-book.html"/>
  <meta name="twitter:card"       content="summary_large_image"/>
  <meta name="twitter:title"      id="tw-title"
        content="Book Lessons | Books 'n' Much More"/>
  <meta name="twitter:description" id="tw-desc"
        content="Life-changing book lessons in Hindi and English — पढ़ते रहिए, बढ़ते रहिए"/>
  <meta name="twitter:image"      id="tw-image"
        content="https://booksnmuchmore.com/og-default.jpg"/>

  <!-- Book schema (JSON-LD) — populated via JS once Supabase
       data loads. Empty object here is intentional: a crawler
       that doesn't execute JS just sees a no-op, not an error. -->
  <script type="application/ld+json" id="book-schema">{}</script>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TYDPW03BMW"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TYDPW03BMW');
  </script>

  <!-- Supabase + Razorpay + our auth/payments modules -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="auth.js"></script>
  <script src="payments.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --parchment: #FDF6EC;
      --amber:     #C07A2A;
      --amber-l:   #D4A45A;
      --amber-xl:  #F5E6CC;
      --dark:      #3D2010;
      --brown:     #5A3520;
      --mid:       #8B5A2B;
      --lite:      #A0703A;
      --cream:     #FFF8EE;
      --sienna:    #7A4A1A;
    }
    body { font-family: 'Lora', Georgia, serif; background: var(--parchment); color: var(--dark); line-height: 1.7; }

    /* ── Nav ── */
    nav { background: var(--dark); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
    nav .logo { font-family: 'Playfair Display', serif; color: var(--amber-l); font-size: 1.1rem; text-decoration: none; }
    nav ul { list-style: none; display: flex; gap: 1.8rem; align-items: center; }
    nav ul a { color: #ccc; text-decoration: none; font-size: .88rem; transition: color .2s; }
    nav ul a:hover, nav ul a.active { color: var(--amber-l); }
    #nav-account-slot { font-size: .85rem; }
    #nav-account-slot button { background: var(--amber); color: #fff; border: none; padding: .35rem .9rem; border-radius: 16px; font-size: .8rem; cursor: pointer; }
    #nav-account-slot button:hover { background: #A06020; }

    /* ── Hero ── */
    .hero { background: linear-gradient(135deg, var(--dark) 0%, #6B3010 100%); color: var(--parchment); padding: 4rem 2rem 5rem; text-align: center; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='2' fill='%23C07A2A' fill-opacity='0.08'/%3E%3C/svg%3E"); pointer-events: none; }
    .hero-tag { display: inline-block; background: var(--amber); color: #fff; font-size: .75rem; letter-spacing: 2px; text-transform: uppercase; padding: .3rem 1rem; border-radius: 20px; margin-bottom: 1.2rem; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.2rem); line-height: 1.2; margin-bottom: .5rem; color: #fff; }
    .hero h1 em { color: var(--amber-l); font-style: italic; }
    .hero .author { font-size: 1rem; color: var(--amber-l); letter-spacing: 1px; margin-bottom: 1.5rem; }
    .hero-desc { max-width: 620px; margin: 0 auto 2rem; font-size: 1rem; color: #d9c9b0; line-height: 1.8; }
    .hero-cta { display: inline-block; background: var(--amber); color: #fff; padding: .75rem 2rem; border-radius: 30px; text-decoration: none; font-size: .9rem; cursor: pointer; border: none; transition: background .2s, transform .2s; }
    .hero-cta:hover { background: #A06020; transform: translateY(-2px); }

    /* ── Book strip ── */
    .book-strip-wrap { max-width: 860px; margin: -2.5rem auto 0; padding: 0 1.5rem; position: relative; z-index: 2; }
    .book-strip { background: var(--cream); border: 1px solid var(--amber-l); border-radius: 16px; padding: 1.5rem 2rem; display: flex; align-items: center; gap: 2rem; box-shadow: 0 8px 32px rgba(61,32,16,.12); }
    .book-strip img { width: 80px; border-radius: 6px; box-shadow: 0 4px 12px rgba(0,0,0,.2); flex-shrink: 0; }
    .book-strip-info h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--dark); }
    .book-strip-info p { font-size: .88rem; color: var(--mid); margin: .2rem 0 .6rem; }
    .buy-btn { display: inline-block; background: var(--amber); color: #fff; padding: .4rem 1.2rem; border-radius: 20px; text-decoration: none; font-size: .82rem; transition: background .2s; border: none; cursor: pointer; }
    .buy-btn:hover { background: #A06020; }
    .affiliate-note { font-size: .75rem; color: var(--lite); margin-top: .4rem; }

    /* ── Pricing banner (new) ── */
    .pricing-banner { max-width: 860px; margin: 1.5rem auto 0; padding: 0 1.5rem; }
    .pricing-banner-inner {
      background: var(--dark); color: var(--parchment); border-radius: 14px;
      padding: 1.1rem 1.6rem; display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; flex-wrap: wrap;
    }
    .pricing-banner-inner p { font-size: .88rem; color: #d9c9b0; }
    .pricing-banner-inner p strong { color: var(--amber-l); }
    .unlock-book-btn {
      background: var(--amber-l); color: var(--dark); border: none; padding: .55rem 1.3rem;
      border-radius: 20px; font-size: .85rem; font-weight: 600; cursor: pointer; transition: background .2s; white-space: nowrap;
    }
    .unlock-book-btn:hover { background: #fff; }

    /* ── Lessons ── */
    .lessons-wrap { max-width: 860px; margin: 3.5rem auto 4rem; padding: 0 1.5rem; }
    .lessons-wrap h2 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: var(--dark); text-align: center; margin-bottom: 2.5rem; }
    .lessons-wrap h2::after { content: ''; display: block; width: 60px; height: 3px; background: var(--amber); margin: .6rem auto 0; border-radius: 2px; }
    .lesson { background: var(--cream); border: 1px solid var(--amber-xl); border-left: 5px solid var(--amber); border-radius: 12px; padding: 1.8rem 2rem; margin-bottom: 1.6rem; transition: box-shadow .2s, transform .2s; }
    .lesson:hover { box-shadow: 0 8px 28px rgba(192,122,42,.12); transform: translateY(-2px); }
    .lesson-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: .8rem; }
    .lesson-number { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--amber-l); line-height: 1; flex-shrink: 0; }
    .lesson-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--dark); }
    .lesson-content { font-size: .95rem; color: var(--brown); line-height: 1.8; margin-bottom: .8rem; white-space: pre-line; }
    .lesson-quote { display: block; font-family: 'Playfair Display', serif; font-size: .95rem; color: var(--amber); margin-top: .8rem; font-style: italic; }

    /* ── Locked lesson state (new) ── */
    .lesson.locked { border-left-color: var(--lite); background: #FBF3E7; }
    .lesson.locked .lesson-number { color: var(--amber-xl); }
    .lesson-teaser { font-size: .92rem; color: var(--mid); font-style: italic; margin-bottom: 1rem; }
    .unlock-lesson-btn {
      background: var(--amber); color: #fff; border: none; padding: .5rem 1.2rem;
      border-radius: 18px; font-size: .82rem; cursor: pointer; transition: background .2s;
    }
    .unlock-lesson-btn:hover { background: #A06020; }

    /* ── Bottom CTA ── */
    .bottom-cta { background: linear-gradient(135deg, var(--dark), #6B3010); color: #fff; text-align: center; padding: 3rem 2rem; }
    .bottom-cta h3 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: .8rem; }
    .bottom-cta p { color: #d9c9b0; font-size: .95rem; margin-bottom: 1.5rem; }

    /* ── More books ── */
    .more-books { max-width: 860px; margin: 3rem auto; padding: 0 1.5rem; text-align: center; }
    .more-books h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--dark); margin-bottom: 1rem; }
    .more-books a, .more-books span { display: inline-block; background: var(--amber-xl); border: 1px solid var(--amber-l); color: var(--sienna); padding: .5rem 1.4rem; border-radius: 20px; text-decoration: none; font-size: .88rem; margin: .3rem; transition: background .2s; }
    .more-books a:hover { background: var(--amber-l); color: #fff; }
    .more-books span { opacity: .6; cursor: default; }

    /* ── Footer ── */
    footer { background: var(--dark); color: #aaa; text-align: center; padding: 1.5rem; font-size: .82rem; }
    footer a { color: var(--amber-l); text-decoration: none; }

    /* ── Error / loading state ── */
    .error-state, .loading-state { text-align: center; padding: 6rem 2rem; }
    .error-state h2, .loading-state h2 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--dark); margin-bottom: 1rem; }
    .error-state p, .loading-state p { color: var(--mid); margin-bottom: 1.5rem; }
    .error-state a { color: var(--amber); }

    @media (max-width: 600px) {
      .book-strip { flex-direction: column; text-align: center; }
      nav ul { gap: 1rem; }
      .pricing-banner-inner { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">📚 Books 'n' Much More</a>
  <ul>
    <li><a href="index.html">होम</a></li>
    <li><a href="stories.html">कहानियाँ</a></li>
    <li><a href="books.html">किताबें</a></li>
    <li><a href="lessons.html" class="active">📖 Lessons</a></li>
    <li id="nav-account-slot"></li>
  </ul>
</nav>

<!-- Content injected by JS -->
<div id="app"><div class="loading-state"><h2>Loading…</h2></div></div>

<script>
  // ── Affiliate config — reads book.affiliate_links directly ────
  // (single source of truth is now the `affiliate_links` jsonb
  // column on the books table itself — populated alongside the
  // book's other data, no separate file to keep in sync)
  let userCountry = null;

  async function detectCountry() {
    try { const r = await fetch('https://ipapi.co/json/'); const d = await r.json(); userCountry = d.country_code; }
    catch(e) { userCountry = 'US'; }
  }

  // Maps a visitor's country code -> which key to look up in
  // book.affiliate_links. Mirrors the old affiliate-links.js logic.
  function getMarketKey(countryCode) {
    const map = { IN: 'IN', CA: 'CA', GB: 'GB', DE: 'DE', AT: 'DE', BE: 'DE', CH: 'DE' };
    return map[countryCode] || 'US';
  }

  // book.affiliate_links values are a mix of full URLs (legacy,
  // most entries) and bare ASINs (some GB/DE entries) — handle both.
  function buildAffiliateLinkFromBook(book, countryCode) {
    const links = book.affiliate_links || {};
    const market = getMarketKey(countryCode);
    const value = links[market] || links.US || '';
    const tag = AFFILIATE_TAGS[market] || AFFILIATE_TAGS.US;
    if (!value) return '#'; // no link data — shouldn't happen now that all 41 books have it, but fail safe
    if (value.startsWith('http')) {
      return value + (value.includes('?') ? '&' : '?') + 'tag=' + tag;
    }
    const base = AMAZON_BASE_URLS[market] || AMAZON_BASE_URLS.US;
    return base + value + '?tag=' + tag;
  }

  const AFFILIATE_TAGS = {
    IN: "booksnmuchm02-21", US: "booksnmuchmor-20", CA: "booksnmuchm08-20",
    GB: "booksnmuchm08-21", DE: "booksnmuchm0f-21"
  };
  const AMAZON_BASE_URLS = {
    IN: "https://www.amazon.in/dp/", US: "https://www.amazon.com/dp/",
    CA: "https://www.amazon.ca/dp/", GB: "https://www.amazon.co.uk/dp/", DE: "https://www.amazon.de/dp/"
  };

  function geoUrl(slug) {
    // book is already in scope from render() — see below
    return buildAffiliateLinkFromBook(window.__currentBook || {}, userCountry || 'US');
  }

  function openAmazon(slug) { window.open(geoUrl(slug), '_blank'); }

  function getSlug() {
    const params = new URLSearchParams(window.location.search);
    return params.get('book') || '';
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function setMeta(id, val) {
    const el = document.getElementById(id);
    if (el && val) el.setAttribute('content', val);
  }

  // ── Nav account slot: shows "Login" or "Hi, <email>" + logout ──
  // Called on page load AND on every login/logout via BNMAuth.onAuthChange,
  // so it always reflects the real, current session state.
  async function renderNavAccount() {
    const slot = document.getElementById('nav-account-slot');
    if (!slot) return; // DOM not ready yet on the very first auth-state fire; safe to skip
    const user = await BNMAuth.getUser();
    if (user) {
      slot.innerHTML = `<span style="color:#d9c9b0;margin-right:.6rem;">Hi, ${user.email}</span><button onclick="BNMAuth.logout()">Logout</button>`;
    } else {
      slot.innerHTML = `<button onclick="BNMAuth.openModal()">Login</button>`;
    }
  }

  // ── Render lessons (locked/unlocked) ──────────────────────
  function renderLessonsHtml(lessons, book) {
    return lessons.map(l => {
      if (l.out_unlocked) {
        return `
          <div class="lesson">
            <div class="lesson-header">
              <span class="lesson-number">${pad(l.out_order_num)}</span>
              <h3 class="lesson-title">${l.out_title}</h3>
            </div>
            <p class="lesson-content">${l.out_content}</p>
          </div>`;
      } else {
        const safeTitle = l.out_title.replace(/'/g, "\\'");
        return `
          <div class="lesson locked">
            <div class="lesson-header">
              <span class="lesson-number">${pad(l.out_order_num)}</span>
              <h3 class="lesson-title">${l.out_title}</h3>
            </div>
            <p class="lesson-teaser">${l.out_teaser || 'इस lesson को unlock करें पूरा content पढ़ने के लिए।'}</p>
            <button class="unlock-lesson-btn"
              onclick="BNMPayments.unlockLesson('${l.out_id}', ${l.out_price_rs}, '${book.title.replace(/'/g, "\\'")}', '${safeTitle}')">
              🔒 Unlock for ₹${l.out_price_rs}
            </button>
          </div>`;
      }
    }).join('');
  }

  // ── Main render ────────────────────────────────────────────
  async function render() {
    const slug = getSlug();
    const app  = document.getElementById('app');

    if (!slug) {
      app.innerHTML = `
        <div class="error-state">
          <h2>Book Not Found</h2>
          <p>No book was specified.</p>
          <a href="lessons.html">← Back to All Lessons</a>
        </div>`;
      return;
    }

    // Fetch book metadata
    const { data: bookRows, error: bookError } = await BNMAuth.supabase
      .rpc('get_book_by_slug', { p_slug: slug });

    if (bookError || !bookRows || bookRows.length === 0) {
      app.innerHTML = `
        <div class="error-state">
          <h2>Book Not Found</h2>
          <p>We couldn't find lessons for "<strong>${slug}</strong>".</p>
          <a href="lessons.html">← Back to All Lessons</a>
        </div>`;
      return;
    }
    const book = bookRows[0];
    window.__currentBook = book; // so openAmazon()/geoUrl() can read book.affiliate_links

    // Fetch lessons (paywall-aware)
    const { data: lessons, error: lessonsError } = await BNMAuth.supabase
      .rpc('get_lessons_for_book', { p_book_slug: slug });

    if (lessonsError) {
      console.error(lessonsError);
      app.innerHTML = `<div class="error-state"><h2>Something went wrong</h2><p>Please try again shortly.</p></div>`;
      return;
    }

    // Fetch list of other books for "more books" section
    const { data: allBooks } = await BNMAuth.supabase.rpc('get_all_live_books');

    // ── Update <title>, description, and OG tags ───────────
    const pageTitle = `${book.title} — Top 10 Lessons | Books 'n' Much More`;
    const pageDesc  = `Top 10 life-changing lessons from ${book.title} by ${book.author} — Hindi & English में | Books 'n' Much More`;
    const pageUrl   = `https://booksnmuchmore.com/lessons-book.html?book=${book.slug}`;

    document.getElementById('page-title').textContent = pageTitle;
    document.getElementById('page-desc').setAttribute('content', pageDesc);
    setMeta('og-title',  pageTitle);
    setMeta('og-desc',   pageDesc);
    setMeta('og-image',  book.cover_url);
    setMeta('og-url',    pageUrl);
    setMeta('tw-title',  pageTitle);
    setMeta('tw-desc',   pageDesc);
    setMeta('tw-image',  book.cover_url);

    // Canonical URL — self-referencing, includes the ?book= param
    document.getElementById('canonical-url').setAttribute('href', pageUrl);

    // ── JSON-LD Book schema ──────────────────────────────────
    // Only includes fields we actually have data for (id, slug,
    // title, author, genre, cover_url, description, price_rs) —
    // no isbn/pageCount/datePublished since those columns don't
    // exist on the books table. Add them here later if/when they do.
    const bookSchema = {
      "@context": "https://schema.org",
      "@type": "Book",
      "name": book.title,
      "author": {
        "@type": "Person",
        "name": book.author
      },
      "image": book.cover_url,
      "description": book.description || pageDesc,
      "url": pageUrl,
      ...(book.genre ? { "genre": book.genre } : {}),
      "inLanguage": ["en", "hi"],
      "workExample": {
        "@type": "Book",
        "bookFormat": "https://schema.org/EBook"
      }
    };
    document.getElementById('book-schema').textContent = JSON.stringify(bookSchema);

    const titleHtml = book.title; // plain title; swap for styled <em> wrap if you want italic sub-part

    const lessonsHtml = renderLessonsHtml(lessons, book);

    const moreBooksHtml = (allBooks || [])
      .filter(b => b.slug !== slug)
      .map(b => b.live
        ? `<a href="lessons-book.html?book=${b.slug}">📚 ${b.title}</a>`
        : `<span>📚 ${b.title} <small style="color:#aaa">— Coming Soon</small></span>`)
      .join('\n');

    // Does the user already own the whole book or an active subscription?
    // (lessons array's "unlocked" flags already reflect this — if every
    // lesson is unlocked, hide the "unlock book" banner entirely)
    const allUnlocked = lessons.every(l => l.out_unlocked);

    app.innerHTML = `
      <div class="hero">
        <span class="hero-tag">📖 Book Lessons</span>
        <h1>${titleHtml}</h1>
        <p class="author">— ${book.author}</p>
        <p class="hero-desc">${book.description || ''}</p>
        <button class="hero-cta" id="hero-buy-btn">📦 Get the Book on Amazon</button>
      </div>

      <div class="book-strip-wrap">
        <div class="book-strip">
          <img src="${book.cover_url}" alt="${book.title}"/>
          <div class="book-strip-info">
            <h3>${book.title}</h3>
            <p>${book.author} &nbsp;·&nbsp; ${book.genre || ''}</p>
            <button class="buy-btn" id="strip-buy-btn">🛒 Buy on Amazon →</button>
            <p class="affiliate-note">🇮🇳 India · 🇺🇸 US · 🇨🇦 Canada · 🇬🇧 UK · 🇩🇪 Germany · 🌍 Others → Amazon.com<br/>* Affiliate link — आपकी कोई extra cost नहीं 🙏</p>
          </div>
        </div>
      </div>

      ${allUnlocked ? '' : `
      <div class="pricing-banner">
        <div class="pricing-banner-inner">
          <p>लेसन 1-2 हमेशा free हैं। बाकी ₹1/lesson या <strong>पूरी किताब सिर्फ ₹${book.price_rs}</strong> में unlock करें।</p>
          <button class="unlock-book-btn" onclick="BNMPayments.unlockBook('${book.id}', ${book.price_rs}, '${book.title.replace(/'/g, "\\'")}')">
            🔓 Unlock Full Book — ₹${book.price_rs}
          </button>
        </div>
      </div>`}

      <div class="lessons-wrap">
        <h2>10 Life-Changing Lessons</h2>
        ${lessonsHtml}
      </div>

      <div class="bottom-cta">
        <h3>Ready to Read the Full Book?</h3>
        <p>These 10 lessons are just the surface. The real transformation happens when you read every page yourself.</p>
        <button class="buy-btn" id="bottom-buy-btn" style="font-size:1rem;padding:.75rem 2.2rem;">📦 Buy on Amazon →</button>
        <p style="margin-top:.8rem;font-size:.78rem;color:#a0907a;">🇮🇳 India · 🇺🇸 US · 🇨🇦 Canada · 🇬🇧 UK · 🇩🇪 Germany · 🌍 Others → Amazon.com<br/>* Affiliate link — no extra cost to you. Your purchase supports this channel. 🙏</p>
      </div>

      <div class="more-books">

  // ── Keep nav account slot AND lesson lock state in sync with login ──
  // renderNavAccount() used to run once at page load and never again,
  // which is why the "Login" button never updated after a successful OTP.
  // BNMAuth.onAuthChange fires immediately with the restored session (if
  // any) and again on every future login/logout, so both the nav and the
  // lesson list (locked/unlocked) now stay correct automatically.
  // NOTE: the two calls are intentionally separate statements (not
  // chained) so that if one throws for any reason, the other still runs.
  BNMAuth.onAuthChange(() => {
    renderNavAccount();
  });
  BNMAuth.onAuthChange(() => {
    if (document.getElementById('app')) render(); // re-fetch get_lessons_for_book so unlocked lessons show live
  });
