<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">Book Lessons | Books 'n' Much More</title>
  <meta name="description" id="page-desc" content="Life-changing book lessons in Hindi and English — Books 'n' Much More"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --parchment: #FDF6EC;
      --amber:     #C07A2A;
      --amber-l:   #D4A45A;
      --amber-xl:  #F5E6CC;
      --dark:      #3D2010;
      --brown:     #5A3520;
      --mid:       #8B5A2B;
      --lite:      #A0703A;
      --cream:     #FFF8EE;
      --sienna:    #7A4A1A;
    }
    body { font-family: 'Lora', Georgia, serif; background: var(--parchment); color: var(--dark); line-height: 1.7; }

    /* ── Nav ── */
    nav { background: var(--dark); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
    nav .logo { font-family: 'Playfair Display', serif; color: var(--amber-l); font-size: 1.1rem; text-decoration: none; }
    nav ul { list-style: none; display: flex; gap: 1.8rem; }
    nav ul a { color: #ccc; text-decoration: none; font-size: .88rem; transition: color .2s; }
    nav ul a:hover, nav ul a.active { color: var(--amber-l); }

    /* ── Hero ── */
    .hero { background: linear-gradient(135deg, var(--dark) 0%, #6B3010 100%); color: var(--parchment); padding: 4rem 2rem 5rem; text-align: center; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='2' fill='%23C07A2A' fill-opacity='0.08'/%3E%3C/svg%3E"); pointer-events: none; }
    .hero-tag { display: inline-block; background: var(--amber); color: #fff; font-size: .75rem; letter-spacing: 2px; text-transform: uppercase; padding: .3rem 1rem; border-radius: 20px; margin-bottom: 1.2rem; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.2rem); line-height: 1.2; margin-bottom: .5rem; color: #fff; }
    .hero h1 em { color: var(--amber-l); font-style: italic; }
    .hero .author { font-size: 1rem; color: var(--amber-l); letter-spacing: 1px; margin-bottom: 1.5rem; }
    .hero-desc { max-width: 620px; margin: 0 auto 2rem; font-size: 1rem; color: #d9c9b0; line-height: 1.8; }
    .hero-cta { display: inline-block; background: var(--amber); color: #fff; padding: .75rem 2rem; border-radius: 30px; text-decoration: none; font-size: .9rem; cursor: pointer; border: none; transition: background .2s, transform .2s; }
    .hero-cta:hover { background: #A06020; transform: translateY(-2px); }

    /* ── Book strip ── */
    .book-strip-wrap { max-width: 860px; margin: -2.5rem auto 0; padding: 0 1.5rem; position: relative; z-index: 2; }
    .book-strip { background: var(--cream); border: 1px solid var(--amber-l); border-radius: 16px; padding: 1.5rem 2rem; display: flex; align-items: center; gap: 2rem; box-shadow: 0 8px 32px rgba(61,32,16,.12); }
    .book-strip img { width: 80px; border-radius: 6px; box-shadow: 0 4px 12px rgba(0,0,0,.2); flex-shrink: 0; }
    .book-strip-info h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--dark); }
    .book-strip-info p { font-size: .88rem; color: var(--mid); margin: .2rem 0 .6rem; }
    .buy-btn { display: inline-block; background: var(--amber); color: #fff; padding: .4rem 1.2rem; border-radius: 20px; text-decoration: none; font-size: .82rem; transition: background .2s; border: none; cursor: pointer; }
    .buy-btn:hover { background: #A06020; }
    .affiliate-note { font-size: .75rem; color: var(--lite); margin-top: .4rem; }

    /* ── Lessons ── */
    .lessons-wrap { max-width: 860px; margin: 3.5rem auto 4rem; padding: 0 1.5rem; }
    .lessons-wrap h2 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: var(--dark); text-align: center; margin-bottom: 2.5rem; }
    .lessons-wrap h2::after { content: ''; display: block; width: 60px; height: 3px; background: var(--amber); margin: .6rem auto 0; border-radius: 2px; }
    .lesson { background: var(--cream); border: 1px solid var(--amber-xl); border-left: 5px solid var(--amber); border-radius: 12px; padding: 1.8rem 2rem; margin-bottom: 1.6rem; transition: box-shadow .2s, transform .2s; }
    .lesson:hover { box-shadow: 0 8px 28px rgba(192,122,42,.12); transform: translateY(-2px); }
    .lesson-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: .8rem; }
    .lesson-number { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--amber-l); line-height: 1; flex-shrink: 0; }
    .lesson-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--dark); }
    .lesson-en { font-size: .95rem; color: var(--brown); line-height: 1.8; margin-bottom: .8rem; }
    .lesson-hi { font-size: .93rem; color: var(--mid); line-height: 1.8; border-top: 1px dashed var(--amber-l); padding-top: .7rem; }
    .lesson-quote { display: block; font-family: 'Playfair Display', serif; font-size: .95rem; color: var(--amber); margin-top: .8rem; font-style: italic; }

    /* ── Bottom CTA ── */
    .bottom-cta { background: linear-gradient(135deg, var(--dark), #6B3010); color: #fff; text-align: center; padding: 3rem 2rem; }
    .bottom-cta h3 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: .8rem; }
    .bottom-cta p { color: #d9c9b0; font-size: .95rem; margin-bottom: 1.5rem; }

    /* ── More books ── */
    .more-books { max-width: 860px; margin: 3rem auto; padding: 0 1.5rem; text-align: center; }
    .more-books h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--dark); margin-bottom: 1rem; }
    .more-books a, .more-books span { display: inline-block; background: var(--amber-xl); border: 1px solid var(--amber-l); color: var(--sienna); padding: .5rem 1.4rem; border-radius: 20px; text-decoration: none; font-size: .88rem; margin: .3rem; transition: background .2s; }
    .more-books a:hover { background: var(--amber-l); color: #fff; }
    .more-books span { opacity: .6; cursor: default; }

    /* ── Footer ── */
    footer { background: var(--dark); color: #aaa; text-align: center; padding: 1.5rem; font-size: .82rem; }
    footer a { color: var(--amber-l); text-decoration: none; }

    /* ── Error state ── */
    .error-state { text-align: center; padding: 6rem 2rem; }
    .error-state h2 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--dark); margin-bottom: 1rem; }
    .error-state p { color: var(--mid); margin-bottom: 1.5rem; }
    .error-state a { color: var(--amber); }

    @media (max-width: 600px) {
      .book-strip { flex-direction: column; text-align: center; }
      nav ul { gap: 1rem; }
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">📚 Books 'n' Much More</a>
  <ul>
    <li><a href="index.html">होम</a></li>
    <li><a href="stories.html">कहानियाँ</a></li>
    <li><a href="books.html">किताबें</a></li>
    <li><a href="lessons.html" class="active">📖 Lessons</a></li>
  </ul>
</nav>

<!-- Content injected by JS -->
<div id="app"></div>

<!-- Load data then render -->
<script src="lessons-data.js"></script>
<script>
  // ── Affiliate config ──────────────────────────────────────
  const TAGS = { IN: 'booksnmuchm02-21', US: 'booksnmuchmor-20', CA: 'booksnmuchm08-20' };
  let userCountry = null;

  async function detectCountry() {
    try { const r = await fetch('https://ipapi.co/json/'); const d = await r.json(); userCountry = d.country_code; }
    catch(e) { userCountry = 'US'; }
  }

  function geoUrl(amazon) {
    const tag = userCountry === 'IN' ? TAGS.IN : userCountry === 'CA' ? TAGS.CA : TAGS.US;
    const base = userCountry === 'IN' ? amazon.IN : userCountry === 'CA' ? amazon.CA : amazon.US;
    return base + '?tag=' + tag;
  }

  function openAmazon(amazon) { window.open(geoUrl(amazon), '_blank'); }

  // ── Read slug from URL ?book=slug ─────────────────────────
  function getSlug() {
    const params = new URLSearchParams(window.location.search);
    return params.get('book') || '';
  }

  // ── Pad lesson number ─────────────────────────────────────
  function pad(n) { return String(n).padStart(2, '0'); }

  // ── Render ─────────────────────────────────────────────────
  function render() {
    const slug = getSlug();
    const book = BOOKS_DATA[slug];
    const app  = document.getElementById('app');

    if (!book) {
      app.innerHTML = `
        <div class="error-state">
          <h2>Book Not Found</h2>
          <p>We couldn't find lessons for "<strong>${slug || 'this book'}</strong>".</p>
          <a href="lessons.html">← Back to All Lessons</a>
        </div>`;
      return;
    }

    // Update <title> and meta
    document.getElementById('page-title').textContent = `${book.title} — Top 10 Lessons | Books 'n' Much More`;
    document.getElementById('page-desc').setAttribute('content', `Top 10 life-changing lessons from ${book.title} by ${book.author} — in Hindi and English.`);

    // Build lessons HTML
    const lessonsHtml = book.lessons.map((l, i) => `
      <div class="lesson">
        <div class="lesson-header">
          <span class="lesson-number">${pad(i + 1)}</span>
          <h3 class="lesson-title">${l.title}</h3>
        </div>
        <p class="lesson-en">${l.en}</p>
        <p class="lesson-hi">${l.hi}</p>
        <em class="lesson-quote">${l.quote}</em>
      </div>`).join('');

    // Build "more books" links
    const moreBooksHtml = Object.values(BOOKS_DATA)
      .filter(b => b.slug !== slug)
      .map(b => b.live
        ? `<a href="lessons-book.html?book=${b.slug}">📚 ${b.title}</a>`
        : `<span>📚 ${b.title} <small style="color:#aaa">— Coming Soon</small></span>`)
      .join('\n');

    app.innerHTML = `
      <div class="hero">
        <span class="hero-tag">📖 Book Lessons</span>
        <h1>${book.titleHtml}</h1>
        <p class="author">— ${book.author}</p>
        <p class="hero-desc">${book.heroDesc}</p>
        <button class="hero-cta" id="hero-buy-btn">📦 Get the Book on Amazon</button>
      </div>

      <div class="book-strip-wrap">
        <div class="book-strip">
          <img src="${book.cover}" alt="${book.title}"/>
          <div class="book-strip-info">
            <h3>${book.title}</h3>
            <p>${book.author} &nbsp;·&nbsp; ${book.genre} &nbsp;·&nbsp; ${book.rating}</p>
            <button class="buy-btn" id="strip-buy-btn">🛒 Buy on Amazon →</button>
            <p class="affiliate-note">🇮🇳 India · 🇺🇸 US · 🇨🇦 Canada · 🌍 Others → Amazon.com<br/>* Affiliate link — आपकी कोई extra cost नहीं 🙏</p>
          </div>
        </div>
      </div>

      <div class="lessons-wrap">
        <h2>10 Life-Changing Lessons</h2>
        ${lessonsHtml}
      </div>

      <div class="bottom-cta">
        <h3>Ready to Read the Full Book?</h3>
        <p>These 10 lessons are just the surface. The real transformation happens when you read every page yourself.</p>
        <button class="buy-btn" id="bottom-buy-btn" style="font-size:1rem;padding:.75rem 2.2rem;">📦 Buy on Amazon →</button>
        <p style="margin-top:.8rem;font-size:.78rem;color:#a0907a;">🇮🇳 India · 🇺🇸 US · 🇨🇦 Canada · 🌍 Others → Amazon.com<br/>* Affiliate link — no extra cost to you. Your purchase supports this channel. 🙏</p>
      </div>

      <div class="more-books">
        <h3>Explore More Book Lessons</h3>
        <a href="lessons.html">📖 All Lessons →</a>
        ${moreBooksHtml}
      </div>

      <footer>
        <p>© 2026 Books 'n' Much More &nbsp;·&nbsp; <a href="https://youtube.com/@booksnmuchmore" target="_blank">YouTube</a> &nbsp;·&nbsp; <a href="index.html">Home</a></p>
        <p style="margin-top:.4rem;">Affiliate Disclosure: This page contains Amazon affiliate links.</p>
      </footer>`;

    // Wire up buy buttons after DOM is ready
    document.getElementById('hero-buy-btn').addEventListener('click', () => openAmazon(book.amazon));
    document.getElementById('strip-buy-btn').addEventListener('click', () => openAmazon(book.amazon));
    document.getElementById('bottom-buy-btn').addEventListener('click', () => openAmazon(book.amazon));
  }

  detectCountry().then(render);
</script>

</body>
</html>
