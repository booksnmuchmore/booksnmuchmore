  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --parchment: #FDF6EC;
      --amber:     #C07A2A;
      --amber-l:   #D4A45A;
      --amber-xl:  #F5E6CC;
      --dark:      #3D2010;
      --brown:     #5A3520;
      --mid:       #8B5A2B;
      --lite:      #A0703A;
      --cream:     #FFF8EE;
      --sienna:    #7A4A1A;
    }
    body { font-family: 'Lora', Georgia, serif; background: var(--parchment); color: var(--dark); line-height: 1.7; }

    /* ── Nav ── */
    nav { background: var(--dark); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
    nav .logo { font-family: 'Playfair Display', serif; color: var(--amber-l); font-size: 1.1rem; text-decoration: none; }
    nav ul { list-style: none; display: flex; gap: 1.8rem; }
    nav ul a { color: #ccc; text-decoration: none; font-size: .88rem; transition: color .2s; }
    nav ul a:hover, nav ul a.active { color: var(--amber-l); }

    /* ── Hero ── */
    .hero { background: linear-gradient(135deg, var(--dark) 0%, #6B3010 100%); color: var(--parchment); padding: 4rem 2rem 5rem; text-align: center; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='2' fill='%23C07A2A' fill-opacity='0.08'/%3E%3C/svg%3E"); pointer-events: none; }
    .hero-tag { display: inline-block; background: var(--amber); color: #fff; font-size: .75rem; letter-spacing: 2px; text-transform: uppercase; padding: .3rem 1rem; border-radius: 20px; margin-bottom: 1.2rem; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.2rem); line-height: 1.2; margin-bottom: .5rem; color: #fff; }
    .hero h1 em { color: var(--amber-l); font-style: italic; }
    .hero .author { font-size: 1rem; color: var(--amber-l); letter-spacing: 1px; margin-bottom: 1.5rem; }
    .hero-desc { max-width: 620px; margin: 0 auto 2rem; font-size: 1rem; color: #d9c9b0; line-height: 1.8; }

    /* Hero action row: Buy + Share */
    .hero-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .hero-cta { display: inline-flex; align-items: center; gap: .45rem; background: var(--amber); color: #fff; padding: .75rem 1.8rem; border-radius: 30px; text-decoration: none; font-size: .9rem; cursor: pointer; border: none; transition: background .2s, transform .2s; font-family: 'Lora', serif; }
    .hero-cta:hover { background: #A06020; transform: translateY(-2px); }
    .share-btn-hero { display: inline-flex; align-items: center; gap: .45rem; background: transparent; color: var(--amber-l); padding: .75rem 1.6rem; border-radius: 30px; font-size: .9rem; cursor: pointer; border: 2px solid var(--amber-l); transition: background .2s, color .2s, transform .2s; font-family: 'Lora', serif; }
    .share-btn-hero:hover { background: var(--amber-l); color: var(--dark); transform: translateY(-2px); }

    /* ── Book strip ── */
    .book-strip-wrap { max-width: 860px; margin: -2.5rem auto 0; padding: 0 1.5rem; position: relative; z-index: 2; }
    .book-strip { background: var(--cream); border: 1px solid var(--amber-l); border-radius: 16px; padding: 1.5rem 2rem; display: flex; align-items: center; gap: 2rem; box-shadow: 0 8px 32px rgba(61,32,16,.12); }
    .book-strip img { width: 80px; border-radius: 6px; box-shadow: 0 4px 12px rgba(0,0,0,.2); flex-shrink: 0; }
    .book-strip-info h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--dark); }
    .book-strip-info p { font-size: .88rem; color: var(--mid); margin: .2rem 0 .6rem; }
    .strip-actions { display: flex; gap: .7rem; align-items: center; flex-wrap: wrap; margin-top: .4rem; }
    .buy-btn { display: inline-flex; align-items: center; gap: .3rem; background: var(--amber); color: #fff; padding: .4rem 1.2rem; border-radius: 20px; text-decoration: none; font-size: .82rem; transition: background .2s; border: none; cursor: pointer; font-family: 'Lora', serif; }
    .buy-btn:hover { background: #A06020; }
    .share-btn-strip { display: inline-flex; align-items: center; gap: .3rem; background: transparent; color: var(--sienna); padding: .4rem 1.1rem; border-radius: 20px; font-size: .82rem; transition: background .2s, color .2s; border: 1.5px solid var(--amber-l); cursor: pointer; font-family: 'Lora', serif; }
    .share-btn-strip:hover { background: var(--amber-xl); }
    .affiliate-note { font-size: .75rem; color: var(--lite); margin-top: .4rem; }

    /* ── Share modal ── */
    .share-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
    .share-backdrop.open { display: flex; }
    .share-modal { background: var(--cream); border-radius: 18px; padding: 2rem 1.8rem; max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,.3); position: relative; }
    .share-modal h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--dark); margin-bottom: .4rem; }
    .share-modal p { font-size: .85rem; color: var(--mid); margin-bottom: 1.4rem; line-height: 1.6; }
    .share-close { position: absolute; top: 1rem; right: 1.2rem; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--mid); line-height: 1; }
    .share-close:hover { color: var(--dark); }
    .share-options { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; margin-bottom: 1.2rem; }
    .share-option { display: flex; align-items: center; gap: .6rem; padding: .75rem 1rem; border-radius: 12px; font-size: .88rem; cursor: pointer; border: none; font-family: 'Lora', serif; transition: transform .15s, filter .15s; text-decoration: none; justify-content: center; font-weight: 600; }
    .share-option:hover { transform: translateY(-2px); filter: brightness(.93); }
    .share-wa   { background: #25D366; color: #fff; }
    .share-fb   { background: #1877F2; color: #fff; }
    .share-tw   { background: #1DA1F2; color: #fff; }
    .share-copy { background: var(--amber-xl); color: var(--sienna); border: 1.5px solid var(--amber-l); }
    .copy-confirm { display: none; text-align: center; font-size: .8rem; color: #2a9d2a; margin-top: .3rem; font-style: italic; }

    /* ── Lessons ── */
    .lessons-wrap { max-width: 860px; margin: 3.5rem auto 4rem; padding: 0 1.5rem; }
    .lessons-wrap h2 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: var(--dark); text-align: center; margin-bottom: 2.5rem; }
    .lessons-wrap h2::after { content: ''; display: block; width: 60px; height: 3px; background: var(--amber); margin: .6rem auto 0; border-radius: 2px; }
    .lesson { background: var(--cream); border: 1px solid var(--amber-xl); border-left: 5px solid var(--amber); border-radius: 12px; padding: 1.8rem 2rem; margin-bottom: 1.6rem; transition: box-shadow .2s, transform .2s; }
    .lesson:hover { box-shadow: 0 8px 28px rgba(192,122,42,.12); transform: translateY(-2px); }
    .lesson-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: .8rem; }
    .lesson-number { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--amber-l); line-height: 1; flex-shrink: 0; }
    .lesson-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--dark); }
    .lesson-en { font-size: .95rem; color: var(--brown); line-height: 1.8; margin-bottom: .8rem; }
    .lesson-hi { font-size: .93rem; color: var(--mid); line-height: 1.8; border-top: 1px dashed var(--amber-l); padding-top: .7rem; }
    .lesson-quote { display: block; font-family: 'Playfair Display', serif; font-size: .95rem; color: var(--amber); margin-top: .8rem; font-style: italic; }

    /* ── Inline share nudge (after lesson 3) ── */
    .share-nudge { background: linear-gradient(135deg, #FFF3DC, #FDE8BC); border: 1.5px solid var(--amber-l); border-radius: 14px; padding: 1.2rem 1.6rem; margin-bottom: 1.6rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .share-nudge p { font-size: .9rem; color: var(--sienna); }
    .share-nudge p span { display: block; font-size: .78rem; color: var(--lite); margin-top: .2rem; }

    /* ── Bottom CTA ── */
    .bottom-cta { background: linear-gradient(135deg, var(--dark), #6B3010); color: #fff; text-align: center; padding: 3rem 2rem; }
    .bottom-cta h3 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: .8rem; }
    .bottom-cta p { color: #d9c9b0; font-size: .95rem; margin-bottom: 1.5rem; }
    .bottom-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }

    /* ── More books ── */
    .more-books { max-width: 860px; margin: 3rem auto; padding: 0 1.5rem; text-align: center; }
    .more-books h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--dark); margin-bottom: 1rem; }
    .more-books a, .more-books span { display: inline-block; background: var(--amber-xl); border: 1px solid var(--amber-l); color: var(--sienna); padding: .5rem 1.4rem; border-radius: 20px; text-decoration: none; font-size: .88rem; margin: .3rem; transition: background .2s; }
    .more-books a:hover { background: var(--amber-l); color: #fff; }
    .more-books span { opacity: .6; cursor: default; }

    /* ── Footer ── */
    footer { background: var(--dark); color: #aaa; text-align: center; padding: 1.5rem; font-size: .82rem; }
    footer a { color: var(--amber-l); text-decoration: none; }
    footer .footer-disclaimer { margin-top: .5rem; font-size: .76rem; color: #7a6a5a; }

    /* ── Error state ── */
    .error-state { text-align: center; padding: 6rem 2rem; }
    .error-state h2 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--dark); margin-bottom: 1rem; }
    .error-state p { color: var(--mid); margin-bottom: 1.5rem; }
    .error-state a { color: var(--amber); }

    @media (max-width: 600px) {
      .book-strip { flex-direction: column; text-align: center; }
      nav ul { gap: 1rem; }
      .share-options { grid-template-columns: 1fr 1fr; }
      .hero-actions { flex-direction: column; align-items: center; }
    }
  </style>
</head>

    try { const r = await fetch('https://ipapi.co/json/'); const d = await r.json(); userCountry = d.country_code; }

  function geoUrl(amazon) {
    const tag = userCountry === 'IN' ? TAGS.IN : userCountry === 'CA' ? TAGS.CA : TAGS.US;
    const base = userCountry === 'IN' ? amazon.IN : userCountry === 'CA' ? amazon.CA : amazon.US;
    return base + '?tag=' + tag;
  }

  function openAmazon(amazon) { window.open(geoUrl(amazon), '_blank'); }

  function setSEO(slug, book) {
    const seo = BOOK_SEO[slug];
    const pageUrl = window.location.href.split('?')[0] + '?book=' + slug;

    document.getElementById('page-title').textContent     = seo ? seo.titleTag    : `${book.title} — Top 10 Lessons | Books 'n' Much More`;
    document.getElementById('page-desc').setAttribute('content', seo ? seo.description : `Top 10 life-changing lessons from ${book.title} by ${book.author} in Hindi and English.`);
    document.getElementById('page-keywords').setAttribute('content', seo ? seo.keywords : '');

    // Open Graph
    document.getElementById('og-title').setAttribute('content',       seo ? seo.titleTag    : book.title);
    document.getElementById('og-desc').setAttribute('content',        seo ? seo.description : book.heroDesc);
    document.getElementById('og-image').setAttribute('content',       book.cover);
    document.getElementById('og-url').setAttribute('content',         pageUrl);

    // Twitter
    document.getElementById('tw-title').setAttribute('content',       seo ? seo.titleTag    : book.title);
    document.getElementById('tw-desc').setAttribute('content',        seo ? seo.description : book.heroDesc);
    document.getElementById('tw-image').setAttribute('content',       book.cover);
  }

  // ── Share modal logic ─────────────────────────────────────
  function openShareModal() {
    document.getElementById('share-backdrop').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeShareModal() {
    document.getElementById('share-backdrop').classList.remove('open');
    document.body.style.overflow = '';
  }

  function initShare(slug, book) {
    const seo      = BOOK_SEO[slug];
    const shareUrl = window.location.href.split('?')[0] + '?book=' + slug;
    const text     = seo ? seo.shareText : `${book.title} के 10 ज़बरदस्त lessons हिंदी में पढ़ें — बिल्कुल मुफ़्त! 📚`;
    const fullText = text + '\n\n' + shareUrl;

    document.getElementById('share-modal-desc').textContent =
      `"${book.title}" के lessons आपके किसी दोस्त या family member के भी काम आ सकते हैं — बिल्कुल मुफ़्त!`;

    // WhatsApp
    document.getElementById('share-wa').onclick = () => {
      window.open('https://wa.me/?text=' + encodeURIComponent(fullText), '_blank');
    };
    // Facebook
    document.getElementById('share-fb').onclick = () => {
      window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(shareUrl), '_blank');
    };
    // Twitter
    document.getElementById('share-tw').onclick = () => {
      window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent(shareUrl), '_blank');
    };
    // Copy link
    document.getElementById('share-copy').onclick = async () => {
      try {
        await navigator.clipboard.writeText(shareUrl);
        const confirm = document.getElementById('copy-confirm');
        confirm.style.display = 'block';
        setTimeout(() => { confirm.style.display = 'none'; }, 2500);
      } catch(e) {
        prompt('इस link को copy करें:', shareUrl);
      }
    };

    // Close triggers
    document.getElementById('share-close').onclick    = closeShareModal;
    document.getElementById('share-backdrop').onclick = (e) => {
      if (e.target === document.getElementById('share-backdrop')) closeShareModal();
    };
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeShareModal(); });
  }

  // ── Render ─────────────────────────────────────────────────
  function render() {
    const slug = getSlug();
    const book = BOOKS_DATA[slug];
    const app  = document.getElementById('app');

    if (!book) {
      app.innerHTML = `
        <div class="error-state">
          <h2>Book Not Found</h2>
          <p>We couldn't find lessons for "<strong>${slug || 'this book'}</strong>".</p>
          <a href="lessons.html">← Back to All Lessons</a>
        </div>`;
      return;
    }

    // Set SEO tags
    setSEO(slug, book);

    // Build lessons HTML — insert share nudge after lesson 3
    const lessonsHtml = book.lessons.map((l, i) => {
      const lessonCard = `
        <div class="lesson">
          <div class="lesson-header">
            <span class="lesson-number">${pad(i + 1)}</span>
            <h3 class="lesson-title">${l.title}</h3>
          </div>
          <p class="lesson-en">${l.en}</p>
          <p class="lesson-hi">${l.hi}</p>
          <em class="lesson-quote">${l.quote}</em>
        </div>`;
      // Insert share nudge after 3rd lesson (index 2)
      if (i === 2) {
        return lessonCard + `
        <div class="share-nudge">
          <p>💡 क्या ये lessons आपके काम के लग रहे हैं?
            <span>इन्हें किसी दोस्त या family member के साथ share करें — यह page बिल्कुल मुफ़्त है!</span>
          </p>
          <button class="share-btn-strip share-nudge-btn">📤 Share करें</button>
        </div>`;
      }
      return lessonCard;
    }).join('');

    // More books
    const moreBooksHtml = Object.values(BOOKS_DATA)
      .filter(b => b.slug !== slug)
      .map(b => b.live
        ? `<a href="lessons-book.html?book=${b.slug}">📚 ${b.title}</a>`
        : `<span>📚 ${b.title} <small style="color:#aaa">— Coming Soon</small></span>`)
      .join('\n');

    app.innerHTML = `
      <div class="hero">
        <span class="hero-tag">📖 Book Lessons</span>
        <h1>${book.titleHtml}</h1>
        <p class="author">— ${book.author}</p>
        <p class="hero-desc">${book.heroDesc}</p>
        <div class="hero-actions">
          <button class="hero-cta" id="hero-buy-btn">📦 Get the Book on Amazon</button>
          <button class="share-btn-hero" id="hero-share-btn">📤 Share करें</button>
        </div>
      </div>

      <div class="book-strip-wrap">
        <div class="book-strip">
          <img src="${book.cover}" alt="${book.title}"/>
          <div class="book-strip-info">
            <h3>${book.title}</h3>
            <p>${book.author} &nbsp;·&nbsp; ${book.genre} &nbsp;·&nbsp; ${book.rating}</p>
            <div class="strip-actions">
              <button class="buy-btn" id="strip-buy-btn">🛒 Buy on Amazon →</button>
              <button class="share-btn-strip" id="strip-share-btn">📤 Share करें</button>
            </div>
            <p class="affiliate-note">🇮🇳 India · 🇺🇸 US · 🇨🇦 Canada · 🌍 Others → Amazon.com<br/>* Affiliate link — आपकी कोई extra cost नहीं 🙏</p>
          </div>
        </div>
      </div>

      <div class="lessons-wrap">
        <h2>10 Life-Changing Lessons</h2>
        ${lessonsHtml}
      </div>

      <div class="bottom-cta">
        <h3>Ready to Read the Full Book?</h3>
        <p>These 10 lessons are just the surface. The real transformation happens when you read every page yourself.</p>
        <div class="bottom-actions">
          <button class="buy-btn" id="bottom-buy-btn" style="font-size:1rem;padding:.75rem 2.2rem;">📦 Buy on Amazon →</button>
          <button class="share-btn-hero" id="bottom-share-btn" style="font-size:.9rem;">📤 Share करें</button>
        </div>
        <p style="margin-top:.8rem;font-size:.78rem;color:#a0907a;">🇮🇳 India · 🇺🇸 US · 🇨🇦 Canada · 🌍 Others → Amazon.com<br/>* Affiliate link — no extra cost to you. Your purchase supports this channel. 🙏</p>
      </div>

      <div class="more-books">
        <h3>Explore More Book Lessons</h3>
        <a href="lessons.html">📖 All Lessons →</a>
        ${moreBooksHtml}
      </div>

      <footer>
        <p>© 2026 Books 'n' Much More &nbsp;·&nbsp; <a href="https://youtube.com/@booksnmuchmore" target="_blank">YouTube</a> &nbsp;·&nbsp; <a href="index.html">Home</a></p>
        <p style="margin-top:.4rem;">Affiliate Disclosure: This page contains Amazon affiliate links.</p>
        <p class="footer-disclaimer">This site contains summaries and personal takeaways. All book titles and content belong to their respective authors and publishers.</p>
      </footer>`;

    // Wire buy buttons
    document.getElementById('hero-buy-btn').addEventListener('click',   () => openAmazon(book.amazon));
    document.getElementById('strip-buy-btn').addEventListener('click',  () => openAmazon(book.amazon));
    document.getElementById('bottom-buy-btn').addEventListener('click', () => openAmazon(book.amazon));

    // Wire share buttons (hero, strip, bottom)
    ['hero-share-btn','strip-share-btn','bottom-share-btn'].forEach(id => {
      document.getElementById(id).addEventListener('click', openShareModal);
    });
    // Wire mid-page nudge share button
    document.querySelectorAll('.share-nudge-btn').forEach(btn => {
      btn.addEventListener('click', openShareModal);
    });

    // Init share modal with book-specific content
    initShare(slug, book);
  }

  detectCountry().then(render);
</script>

</body>
</html>
